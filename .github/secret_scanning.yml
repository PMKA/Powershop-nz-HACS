paths-ignore:
  # The Firebase API key below is Powershop's own *public* project identifier,
  # not a secret credential. Firebase web API keys are intentionally embedded in
  # app bundles (Android APK, iOS IPA, web JS) and are already publicly
  # discoverable. The key alone cannot access any data — it only identifies the
  # Firebase project; actual access requires completing the OTP → custom-token
  # → ID-token authentication flow.
  # See: https://firebase.google.com/docs/projects/api-keys
  - "custom_components/powershop/const.py"
